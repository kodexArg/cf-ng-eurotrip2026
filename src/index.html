<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Eurotrip 2026</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preload" href="/assets/fonts/material-symbols-outlined.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/fonts/primeicons.woff2" as="font" type="font/woff2" crossorigin>
  <script>
    /* Anti-FOUC icon-font gate. Runs before Angular bootstraps: marks
       <html> as fonts-loading (CSS hides icon glyphs so the stretched
       ligature never flashes), then reveals only once BOTH icon webfonts
       are actually decoded. Failsafe reveals after 8s no matter what so
       icons can never stay hidden on a font/network failure. */
    (function () {
      var d = document.documentElement;
      d.className += ' fonts-loading';
      var done = false;
      function reveal() {
        if (done) return;
        done = true;
        d.className = d.className.replace(/\bfonts-loading\b/, '').trim() + ' fonts-ready';
      }
      try {
        if (document.fonts && document.fonts.load) {
          Promise.all([
            document.fonts.load('1em "Material Symbols Outlined"'),
            document.fonts.load('400 1em "primeicons"')
          ]).then(reveal).catch(reveal);
          document.fonts.ready.then(reveal);
        } else {
          reveal();
        }
      } catch (e) { reveal(); }
      setTimeout(reveal, 8000);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
