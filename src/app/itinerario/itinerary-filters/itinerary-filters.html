<div class="filter-bar">
  <p-togglebutton
    [(ngModel)]="showHitos"
    onLabel="Hitos"
    offLabel="Hitos"
    onIcon="pi pi-map-marker"
    offIcon="pi pi-map-marker"
    class="filter-toggle filter-toggle--hito"
  />
  <p-togglebutton
    [(ngModel)]="showTraslados"
    onLabel="Traslados"
    offLabel="Traslados"
    onIcon="ms ms-flight_takeoff"
    offIcon="ms ms-flight_takeoff"
    class="filter-toggle filter-toggle--traslado"
  />
  <p-togglebutton
    [(ngModel)]="showHospedajes"
    onLabel="Hospedajes"
    offLabel="Hospedajes"
    onIcon="pi pi-home"
    offIcon="pi pi-home"
    class="filter-toggle filter-toggle--hospedaje"
  />
</div>
