name: Deploy to Cloudflare Pages

on:
  push:
    branches: [prod]

jobs:
  # ── Gate: apply any pending D1 migrations before deploying ────────────
  # This job always runs on push to prod. It checks if migration files
  # changed in this push; if yes, it applies them. If the apply fails,
  # the deploy job below is blocked (it declares `needs: migrate`).
  # If there are no pending migrations, wrangler exits 0 (idempotent).
  migrate:
    name: Apply D1 migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for migration changes in this push
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD -- 'migrations/*.sql' | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Migration files changed — will apply."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No migration files changed — skipping apply."
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        if: steps.check.outputs.changed == 'true'

      - name: Apply migrations (remote)
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Applying pending D1 migrations to production database..."
          npx wrangler d1 migrations apply eurotrip2026 --remote
          echo "Migrations applied successfully."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy: build and publish to Cloudflare Pages ────────────────────
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -- --configuration production

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/angular-21-csr-primeng/browser --project-name=eurotrip2026 --branch=prod
