name: Deploy to Cloudflare Pages

on:
  push:
    branches: [prod]

jobs:
  # ── Apply D1 migrations before deploying ─────────────────────────────
  # `wrangler d1 migrations apply` is idempotent: Wrangler tracks applied
  # migrations in its own d1_migrations table and only runs pending ones.
  # We call it unconditionally on every prod push — no git-diff gate needed.
  # A git-diff gate is fragile: if a previous run failed to apply migrations,
  # a later push that doesn't touch migrations/ would silently skip them.
  migrate:
    name: Apply D1 migrations
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply migrations (remote)
        run: |
          echo "Applying pending D1 migrations to production database..."
          npx wrangler d1 migrations apply eurotrip2026 --remote
          echo "Migrations applied successfully."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── Deploy: build and publish to Cloudflare Pages ────────────────────
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: migrate
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -- --configuration production

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/angular-21-csr-primeng/browser --project-name=eurotrip2026 --branch=prod
